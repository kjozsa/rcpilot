<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pi-lot</title>
  <style>
    /* ── Reset & tokens ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #13151f;
      --border:    #2e3140;
      --text:      #e2e4ed;
      --muted:     #7b8096;
      --accent:    #7c6af7;
      --green:     #3ecf8e;
      --red:       #f66;
      --yellow:    #f5a623;
      --radius:    10px;
      --gap:       1rem;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      padding: var(--gap);
      max-width: 640px;
      margin: 0 auto;
    }

    /* ── Header ──────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: var(--gap);
      border-bottom: 1px solid var(--border);
      margin-bottom: var(--gap);
    }

    header h1 { font-size: 1.3rem; letter-spacing: .02em; }
    header h1 span { color: var(--accent); }

    #refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: var(--radius);
      padding: .35rem .75rem;
      cursor: pointer;
      font-size: .85rem;
    }
    #refresh-btn:hover { border-color: var(--accent); color: var(--text); }

    /* ── Project cards ───────────────────────────────────────────────── */
    #project-list { display: flex; flex-direction: column; gap: var(--gap); }

    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--gap);
    }

    .project-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .5rem;
      flex-wrap: wrap;
    }

    .project-name {
      font-weight: 600;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: .4rem;
    }

    .git-badge {
      font-size: .7rem;
      background: #2c2f45;
      color: var(--muted);
      border-radius: 4px;
      padding: .1rem .4rem;
    }

    /* ── Status badge ────────────────────────────────────────────────── */
    .status-badge {
      font-size: .78rem;
      font-weight: 600;
      border-radius: 20px;
      padding: .2rem .7rem;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .status-running   { background: #1a3a2a; color: var(--green); }
    .status-stopped   { background: #2a2030; color: var(--muted); }
    .status-timed_out { background: #3a2a10; color: var(--yellow); }
    .status-loading   { background: #2a2a3a; color: var(--accent); }

    /* ── RC URL link ─────────────────────────────────────────────────── */
    .rc-url-row {
      margin-top: .6rem;
      font-size: .85rem;
      word-break: break-all;
    }
    .rc-url-row a { color: var(--accent); text-decoration: none; }
    .rc-url-row a:hover { text-decoration: underline; }

    /* ── Action buttons ──────────────────────────────────────────────── */
    .action-row {
      display: flex;
      gap: .5rem;
      margin-top: .75rem;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: var(--radius);
      padding: .5rem 1rem;
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    button:disabled { opacity: .4; cursor: default; }
    button:not(:disabled):hover { opacity: .85; }

    .btn-start     { background: var(--accent); color: #fff; }
    .btn-resume    { background: none; color: var(--accent); border: 1px solid var(--accent); }
    .btn-kill      { background: #3a1a1a; color: var(--red); border: 1px solid var(--red); }
    .btn-reconnect { background: #1a2a3a; color: #6ab4f7; border: 1px solid #3a5a7a; }

    /* ── Session history ─────────────────────────────────────────────── */
    .history-toggle {
      margin-top: .75rem;
      background: none;
      border: none;
      color: var(--muted);
      font-size: .8rem;
      cursor: pointer;
      padding: 0;
      font-weight: normal;
    }
    .history-toggle:hover { color: var(--text); opacity: 1; }

    .session-history {
      margin-top: .5rem;
      border-top: 1px solid var(--border);
      padding-top: .5rem;
      display: none;
    }
    .session-history.open { display: block; }

    .history-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .8rem;
      color: var(--muted);
    }
    .history-table th {
      text-align: left;
      padding: .2rem .4rem;
      font-weight: 600;
      color: var(--text);
      border-bottom: 1px solid var(--border);
    }
    .history-table td { padding: .25rem .4rem; }
    .history-table tr:hover td { color: var(--text); }

    /* ── Empty / error states ────────────────────────────────────────── */
    #empty-state {
      text-align: center;
      color: var(--muted);
      padding: 3rem 1rem;
      display: none;
    }

    #error-banner {
      background: #3a1a1a;
      color: var(--red);
      border-radius: var(--radius);
      padding: .6rem 1rem;
      margin-bottom: var(--gap);
      font-size: .88rem;
      display: none;
    }
  </style>
</head>
<body>

<header>
  <h1>pi<span>-</span>lot</h1>
  <button id="refresh-btn" onclick="loadProjects()">↺ Refresh</button>
</header>

<div id="error-banner"></div>
<div id="project-list"></div>
<div id="empty-state">No projects found.<br>Check your <code>projects_dir</code> in config.</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────
  const sessionState = {};   // project name → { status, rc_url }
  const historyCache = {};   // project name → array of session records

  // ── Bootstrap ──────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', loadProjects);

  async function loadProjects() {
    showError(null);
    try {
      const res = await fetch('/api/projects');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const projects = await res.json();

      const list = document.getElementById('project-list');
      list.innerHTML = '';

      if (projects.length === 0) {
        document.getElementById('empty-state').style.display = 'block';
        return;
      }
      document.getElementById('empty-state').style.display = 'none';

      for (const p of projects) {
        list.appendChild(buildCard(p));
        refreshStatus(p.name);
        loadHistory(p.name);
      }
    } catch (err) {
      showError('Failed to load projects: ' + err.message);
    }
  }

  // ── Card builder ───────────────────────────────────────────────────────
  function buildCard(project) {
    const card = document.createElement('div');
    card.className = 'project-card';
    card.id = 'card-' + project.name;

    card.innerHTML = `
      <div class="project-header">
        <div class="project-name">
          ${escHtml(project.name)}
          ${project.has_git ? '<span class="git-badge">git</span>' : ''}
        </div>
        <span class="status-badge status-loading" id="badge-${project.name}">…</span>
      </div>
      <div class="rc-url-row" id="url-${project.name}"></div>
      <div class="action-row" id="actions-${project.name}">
        <button class="btn-start" onclick="startSession('${project.name}')" id="btn-start-${project.name}">Start</button>
        <button class="btn-kill"  onclick="killSession('${project.name}')"  id="btn-kill-${project.name}"  disabled>Kill</button>
      </div>
      <button class="history-toggle" id="hist-toggle-${project.name}"
              onclick="toggleHistory('${project.name}')" style="display:none">
        ▸ History
      </button>
      <div class="session-history" id="history-${project.name}"></div>
    `;
    return card;
  }

  // ── Session actions ────────────────────────────────────────────────────
  async function startSession(name) {
    const btn = document.getElementById(`btn-start-${name}`);
    if (btn) { btn.disabled = true; btn.textContent = 'Starting…'; }
    setBusy(name, true);
    try {
      const res = await fetch(`/api/sessions/${encodeURIComponent(name)}`, { method: 'POST' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      applyState(name, await res.json());
    } catch (err) {
      showError('Failed to start session: ' + err.message);
      setBusy(name, false);
      if (btn) btn.textContent = 'Start';
    }
  }

  async function resumeSession(name) {
    setBusy(name, true);
    try {
      const res = await fetch(`/api/sessions/${encodeURIComponent(name)}/resume`, { method: 'POST' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      applyState(name, await res.json());
    } catch (err) {
      showError('Failed to resume session: ' + err.message);
      setBusy(name, false);
    }
  }

  async function killSession(name) {
    setBusy(name, true);
    try {
      const res = await fetch(`/api/sessions/${encodeURIComponent(name)}`, { method: 'DELETE' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      applyState(name, await res.json());
      // Refresh history after kill so the new stopped record appears
      await loadHistory(name);
    } catch (err) {
      showError('Failed to kill session: ' + err.message);
      setBusy(name, false);
    }
  }

  async function refreshStatus(name) {
    try {
      const res = await fetch(`/api/sessions/${encodeURIComponent(name)}`);
      if (!res.ok) return;
      applyState(name, await res.json());
    } catch (_) { /* silent */ }
  }

  // ── History ────────────────────────────────────────────────────────────
  async function loadHistory(name) {
    try {
      const res = await fetch(`/api/sessions/${encodeURIComponent(name)}/history`);
      if (!res.ok) return;
      const records = await res.json();
      historyCache[name] = records;
      renderHistory(name, records);
    } catch (_) { /* silent */ }
  }

  function renderHistory(name, records) {
    const toggle = document.getElementById(`hist-toggle-${name}`);
    const container = document.getElementById(`history-${name}`);
    if (!toggle || !container) return;

    if (records.length === 0) {
      toggle.style.display = 'none';
      container.innerHTML = '';
      return;
    }

    toggle.style.display = 'block';
    toggle.textContent = (container.classList.contains('open') ? '▾' : '▸') + ` History (${records.length})`;

    // Show at most 5 rows; remaining accessible via "show all" toggle
    const shown = records.slice(0, 5);
    const rows = shown.map(r => `
      <tr>
        <td>${escHtml(r.name || r.started_at.slice(0,10))}</td>
        <td>${escHtml(r.started_at.slice(11,16))} UTC</td>
        <td>${r.ended_at ? escHtml(r.ended_at.slice(11,16)) + ' UTC' : '—'}</td>
        <td><span class="status-badge status-${r.status}" style="font-size:.7rem;padding:.1rem .5rem">${escHtml(r.status)}</span></td>
      </tr>
    `).join('');

    const moreRow = records.length > 5
      ? `<tr><td colspan="4" style="color:var(--muted);font-style:italic">… ${records.length - 5} more</td></tr>`
      : '';

    container.innerHTML = `
      <table class="history-table">
        <thead><tr><th>Date</th><th>Started</th><th>Ended</th><th>Status</th></tr></thead>
        <tbody>${rows}${moreRow}</tbody>
      </table>
    `;

    // Show Resume button if not currently running and there's history
    updateResumeButton(name);
  }

  function toggleHistory(name) {
    const container = document.getElementById(`history-${name}`);
    const toggle = document.getElementById(`hist-toggle-${name}`);
    if (!container) return;
    const open = container.classList.toggle('open');
    const count = (historyCache[name] || []).length;
    toggle.textContent = (open ? '▾' : '▸') + ` History (${count})`;
  }

  function updateResumeButton(name) {
    const state = sessionState[name];
    const history = historyCache[name] || [];
    const actionsRow = document.getElementById(`actions-${name}`);
    if (!actionsRow) return;

    const resumeId = `btn-resume-${name}`;
    let btn = document.getElementById(resumeId);

    const shouldShow = history.length > 0 && (!state || state.status !== 'running');
    if (shouldShow) {
      if (!btn) {
        btn = document.createElement('button');
        btn.id = resumeId;
        btn.className = 'btn-resume';
        btn.textContent = 'Resume';
        btn.onclick = () => resumeSession(name);
        actionsRow.appendChild(btn);
      }
    } else if (btn) {
      btn.remove();
    }
  }

  // ── UI helpers ─────────────────────────────────────────────────────────
  function applyState(name, data) {
    sessionState[name] = data;

    const badge    = document.getElementById(`badge-${name}`);
    const urlRow   = document.getElementById(`url-${name}`);
    const btnStart = document.getElementById(`btn-start-${name}`);
    const btnKill  = document.getElementById(`btn-kill-${name}`);
    if (!badge) return;

    const status = data.status || 'stopped';
    badge.textContent = status;
    badge.className = `status-badge status-${status}`;

    if (data.rc_url) {
      urlRow.innerHTML = `RC: <a href="${escHtml(data.rc_url)}" target="_blank" rel="noopener">${escHtml(data.rc_url)}</a>`;
    } else {
      urlRow.innerHTML = '';
    }

    const running = status === 'running';
    btnStart.disabled = running;
    btnKill.disabled  = !running;

    // Reconnect button — only when running and URL known
    const reconnectId = `btn-reconnect-${name}`;
    let reconnectBtn = document.getElementById(reconnectId);
    if (running && data.rc_url) {
      if (!reconnectBtn) {
        reconnectBtn = document.createElement('button');
        reconnectBtn.id = reconnectId;
        reconnectBtn.className = 'btn-reconnect';
        reconnectBtn.textContent = 'Reconnect';
        const actionsRow = document.getElementById(`actions-${name}`);
        actionsRow.appendChild(reconnectBtn);
      }
      reconnectBtn.onclick = () => window.open(data.rc_url, '_blank', 'noopener');
    } else if (reconnectBtn) {
      reconnectBtn.remove();
    }

    setBusy(name, false);
    updateResumeButton(name);
  }

  function setBusy(name, busy) {
    const btnStart  = document.getElementById(`btn-start-${name}`);
    const btnKill   = document.getElementById(`btn-kill-${name}`);
    const btnResume = document.getElementById(`btn-resume-${name}`);
    if (!btnStart) return;
    if (busy) {
      btnStart.disabled = true;
      btnKill.disabled  = true;
      if (btnResume) { btnResume.disabled = true; btnResume.textContent = 'Starting…'; }
    } else {
      const state = sessionState[name];
      if (state) applyState(name, state);
    }
  }

  function showError(msg) {
    const banner = document.getElementById('error-banner');
    if (msg) { banner.textContent = msg; banner.style.display = 'block'; }
    else { banner.style.display = 'none'; }
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
