<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>claude-pilot</title>
  <style>
    /* ── Reset & tokens ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #13151f;
      --border:    #2e3140;
      --text:      #e2e4ed;
      --muted:     #7b8096;
      --accent:    #7c6af7;
      --green:     #3ecf8e;
      --red:       #f66;
      --yellow:    #f5a623;
      --radius:    10px;
      --gap:       1rem;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      padding: var(--gap);
      max-width: 640px;
      margin: 0 auto;
    }

    /* ── Header ──────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: var(--gap);
      border-bottom: 1px solid var(--border);
      margin-bottom: var(--gap);
    }

    header h1 { font-size: 1.3rem; letter-spacing: .02em; }
    header h1 span { color: var(--accent); }

    #refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: var(--radius);
      padding: .35rem .75rem;
      cursor: pointer;
      font-size: .85rem;
    }
    #refresh-btn:hover { border-color: var(--accent); color: var(--text); }

    /* ── Project cards ───────────────────────────────────────────────── */
    #project-list { display: flex; flex-direction: column; gap: var(--gap); }

    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--gap);
    }

    .project-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .5rem;
      flex-wrap: wrap;
    }

    .project-name {
      font-weight: 600;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: .4rem;
    }

    .git-badge {
      font-size: .7rem;
      background: #2c2f45;
      color: var(--muted);
      border-radius: 4px;
      padding: .1rem .4rem;
    }

    .git-diff-stat {
      font-size: .75rem;
      color: var(--yellow);
      margin-top: .3rem;
    }

    /* ── Status badge ────────────────────────────────────────────────── */
    .status-badge {
      font-size: .78rem;
      font-weight: 600;
      border-radius: 20px;
      padding: .2rem .7rem;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .status-running   { background: #1a3a2a; color: var(--green); }
    .status-stopped   { background: #2a2030; color: var(--muted); }
    .status-timed_out { background: #3a2a10; color: var(--yellow); }
    .status-loading   { background: #2a2a3a; color: var(--accent); }

    /* ── RC URL link ─────────────────────────────────────────────────── */
    .rc-url-row {
      margin-top: .6rem;
      font-size: .85rem;
      word-break: break-all;
    }
    .rc-url-row a { color: var(--accent); text-decoration: none; }
    .rc-url-row a:hover { text-decoration: underline; }
    /* ── Action buttons ──────────────────────────────────────────────── */
    .action-row {
      display: flex;
      gap: .5rem;
      margin-top: .75rem;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: var(--radius);
      padding: .5rem 1rem;
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    button:disabled { opacity: .4; cursor: default; }
    button:not(:disabled):hover { opacity: .85; }

    .btn-connect   { background: var(--accent); color: #fff; }
    .btn-kill      { background: none; color: var(--muted); border: 1px solid var(--border); font-weight: normal; }
    .btn-kill:not(:disabled):hover { border-color: var(--red); color: var(--red); opacity: 1; }
    .btn-pull      { background: none; color: var(--muted); border: 1px solid var(--border); font-weight: normal; }
    .btn-pull:hover { border-color: var(--green); color: var(--green); opacity: 1; }
    .btn-pull.ok   { border-color: var(--green); color: var(--green); }
    .btn-pull.err  { border-color: var(--red); color: var(--red); }

    /* ── Session history ─────────────────────────────────────────────── */
    .history-toggle {
      margin-top: .75rem;
      background: none;
      border: none;
      color: var(--muted);
      font-size: .8rem;
      cursor: pointer;
      padding: 0;
      font-weight: normal;
    }
    .history-toggle:hover { color: var(--text); opacity: 1; }

    .session-history {
      margin-top: .5rem;
      border-top: 1px solid var(--border);
      padding-top: .5rem;
      display: none;
    }
    .session-history.open { display: block; }

    .history-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .8rem;
      color: var(--muted);
    }
    .history-table th {
      text-align: left;
      padding: .2rem .4rem;
      font-weight: 600;
      color: var(--text);
      border-bottom: 1px solid var(--border);
    }
    .history-table td { padding: .25rem .4rem; }
    .history-table tr:hover td { color: var(--text); }

    /* ── Empty / error states ────────────────────────────────────────── */
    #empty-state {
      text-align: center;
      color: var(--muted);
      padding: 3rem 1rem;
      display: none;
    }

    #error-banner {
      background: #3a1a1a;
      color: var(--red);
      border-radius: var(--radius);
      padding: .6rem 1rem;
      margin-bottom: var(--gap);
      font-size: .88rem;
      display: none;
    }

    /* ── Diff modal ──────────────────────────────────────────────────── */
    #diff-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 100;
      align-items: flex-end;
    }
    #diff-overlay.open { display: flex; }

    #diff-sheet {
      background: var(--surface2);
      border-top: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) 0 0;
      width: 100%;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
    }

    #diff-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .6rem 1rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #diff-title { font-size: .9rem; font-weight: 600; color: var(--text); }
    #diff-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.3rem;
      line-height: 1;
      padding: .2rem .5rem;
      cursor: pointer;
    }
    #diff-close:hover { color: var(--text); opacity: 1; }

    #diff-body {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: .75rem 1rem;
      flex: 1;
    }

    #diff-body pre {
      font-family: ui-monospace, monospace;
      font-size: .75rem;
      line-height: 1.5;
      white-space: pre;
      margin: 0;
    }

    .diff-add  { color: var(--green); }
    .diff-del  { color: var(--red); }
    .diff-hunk { color: var(--accent); }
    .diff-meta { color: var(--muted); }

    .git-diff-stat { cursor: pointer; }
    .git-diff-stat:hover { color: var(--text); }
    .git-synced { font-size: .75rem; color: var(--green); margin-top: .3rem; opacity: .6; }
  </style>
</head>
<body>

<header>
  <h1>claude<span>-</span>pilot <small id="version" style="font-size:.7rem;color:var(--muted);font-weight:400"></small></h1>
  <button id="refresh-btn" onclick="loadProjects()">↺ Refresh</button>
</header>

<div id="error-banner"></div>
<div id="project-list"></div>

<div id="diff-overlay" onclick="closeDiff(event)">
  <div id="diff-sheet">
    <div id="diff-header">
      <span id="diff-title">git diff</span>
      <button id="diff-close" onclick="closeDiff()">✕</button>
    </div>
    <div id="diff-body"><pre id="diff-pre"></pre></div>
  </div>
</div>
<div id="empty-state">No projects found.<br>Check your <code>projects_dir</code> in config.</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────
  const sessionState = {};   // project name → { status, rc_url }
  const historyCache = {};   // project name → array of session records

  // ── Bootstrap ──────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    loadProjects();
    fetch('/api/info').then(r => r.json()).then(d => {
      document.getElementById('version').textContent = 'v' + d.version;
    });
  });

  async function loadProjects() {
    showError(null);
    try {
      const res = await fetch('/api/projects');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const projects = await res.json();

      const list = document.getElementById('project-list');
      list.innerHTML = '';

      if (projects.length === 0) {
        document.getElementById('empty-state').style.display = 'block';
        return;
      }
      document.getElementById('empty-state').style.display = 'none';

      for (const p of projects) {
        list.appendChild(buildCard(p));
        refreshStatus(p.name);
        loadHistory(p.name);
      }
    } catch (err) {
      showError('Failed to load projects: ' + err.message);
    }
  }

  // ── Card builder ───────────────────────────────────────────────────────
  function buildCard(project) {
    const card = document.createElement('div');
    card.className = 'project-card';
    card.id = 'card-' + project.name;

    card.innerHTML = `
      <div class="project-header">
        <div class="project-name">
          ${escHtml(project.name)}
          ${project.git_branch ? `<span class="git-badge">${escHtml(project.git_branch)}</span>` : (project.has_git ? '<span class="git-badge">git</span>' : '')}
        </div>
        <span class="status-badge status-loading" id="badge-${project.name}">…</span>
      </div>
      ${project.has_git ? (project.git_diff_stat ? `<div class="git-diff-stat" onclick="showDiff('${project.name}')">~ ${escHtml(project.git_diff_stat)}</div>` : '<div class="git-synced">✓ no local changes</div>') : ''}
      <div class="rc-url-row" id="url-${project.name}"></div>
      <div class="action-row" id="actions-${project.name}">
        <button class="btn-connect" onclick="connectSession('${project.name}')" id="btn-connect-${project.name}">Connect</button>
        <button class="btn-kill"    onclick="killSession('${project.name}')"    id="btn-kill-${project.name}" disabled>Kill</button>
        ${project.has_git ? `<button class="btn-pull" onclick="gitPull(this,'${project.name}')" id="btn-pull-${project.name}">↓ Pull</button>` : ''}
      </div>
      <button class="history-toggle" id="hist-toggle-${project.name}"
              onclick="toggleHistory('${project.name}')" style="display:none">
        ▸ History
      </button>
      <div class="session-history" id="history-${project.name}"></div>
    `;
    return card;
  }

  // ── Session actions ────────────────────────────────────────────────────
  async function connectSession(name) {
    const state = sessionState[name];
    if (state && state.status === 'running' && state.rc_url) {
      window.open(state.rc_url, '_blank', 'noopener');
      return;
    }
    const btn = document.getElementById(`btn-connect-${name}`);
    if (btn) { btn.disabled = true; btn.textContent = 'Starting…'; }
    try {
      const res = await fetch(`/api/sessions/${encodeURIComponent(name)}`, { method: 'POST' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      applyState(name, data);
      if (data.rc_url) window.open(data.rc_url, '_blank', 'noopener');
    } catch (err) {
      showError('Failed to start session: ' + err.message);
      if (btn) { btn.disabled = false; btn.textContent = 'Connect'; }
    }
  }

  async function killSession(name) {
    setBusy(name, true);
    try {
      const res = await fetch(`/api/sessions/${encodeURIComponent(name)}`, { method: 'DELETE' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      applyState(name, await res.json());
      // Refresh history after kill so the new stopped record appears
      await loadHistory(name);
    } catch (err) {
      showError('Failed to kill session: ' + err.message);
      setBusy(name, false);
    }
  }

  async function refreshStatus(name) {
    try {
      const res = await fetch(`/api/sessions/${encodeURIComponent(name)}`);
      if (!res.ok) return;
      applyState(name, await res.json());
    } catch (_) { /* silent */ }
  }

  // ── History ────────────────────────────────────────────────────────────
  async function loadHistory(name) {
    try {
      const res = await fetch(`/api/sessions/${encodeURIComponent(name)}/history`);
      if (!res.ok) return;
      const records = await res.json();
      historyCache[name] = records;
      renderHistory(name, records);
    } catch (_) { /* silent */ }
  }

  function renderHistory(name, records) {
    const toggle = document.getElementById(`hist-toggle-${name}`);
    const container = document.getElementById(`history-${name}`);
    if (!toggle || !container) return;

    if (records.length === 0) {
      toggle.style.display = 'none';
      container.innerHTML = '';
      return;
    }

    toggle.style.display = 'block';
    toggle.textContent = (container.classList.contains('open') ? '▾' : '▸') + ` History (${records.length})`;

    // Show at most 5 rows; remaining accessible via "show all" toggle
    const shown = records.slice(0, 5);
    const rows = shown.map(r => `
      <tr>
        <td>${escHtml(r.name || r.started_at.slice(0,10))}</td>
        <td>${escHtml(r.started_at.slice(11,16))} UTC</td>
        <td>${r.ended_at ? escHtml(r.ended_at.slice(11,16)) + ' UTC' : '—'}</td>
        <td><span class="status-badge status-${r.status}" style="font-size:.7rem;padding:.1rem .5rem">${escHtml(r.status)}</span></td>
      </tr>
    `).join('');

    const moreRow = records.length > 5
      ? `<tr><td colspan="4" style="color:var(--muted);font-style:italic">… ${records.length - 5} more</td></tr>`
      : '';

    container.innerHTML = `
      <table class="history-table">
        <thead><tr><th>Date</th><th>Started</th><th>Ended</th><th>Status</th></tr></thead>
        <tbody>${rows}${moreRow}</tbody>
      </table>
    `;

    // Show Resume button if not currently running and there's history
    updateResumeButton(name);
  }

  function toggleHistory(name) {
    const container = document.getElementById(`history-${name}`);
    const toggle = document.getElementById(`hist-toggle-${name}`);
    if (!container) return;
    const open = container.classList.toggle('open');
    const count = (historyCache[name] || []).length;
    toggle.textContent = (open ? '▾' : '▸') + ` History (${count})`;
  }

  function updateResumeButton(_name) { /* no-op: Connect handles start+resume */ }

  // ── UI helpers ─────────────────────────────────────────────────────────
  function applyState(name, data) {
    sessionState[name] = data;

    const badge      = document.getElementById(`badge-${name}`);
    const urlRow     = document.getElementById(`url-${name}`);
    const btnConnect = document.getElementById(`btn-connect-${name}`);
    const btnKill    = document.getElementById(`btn-kill-${name}`);
    if (!badge) return;

    const status = data.status || 'stopped';
    badge.textContent = status;
    badge.className = `status-badge status-${status}`;

    if (data.rc_url) {
      urlRow.innerHTML = `RC: <a href="${escHtml(data.rc_url)}" target="_blank" rel="noopener">${escHtml(data.rc_url)}</a>`;
    } else {
      urlRow.innerHTML = '';
    }

    const running = status === 'running';
    if (btnConnect) { btnConnect.disabled = false; btnConnect.textContent = 'Connect'; }
    if (btnKill)    { btnKill.disabled = !running; }

    updateResumeButton(name);
  }

  function setBusy(name, busy) {
    const btnConnect = document.getElementById(`btn-connect-${name}`);
    const btnKill    = document.getElementById(`btn-kill-${name}`);
    if (!btnConnect) return;
    if (busy) {
      btnConnect.disabled = true;
      if (btnKill) btnKill.disabled = true;
    } else {
      const state = sessionState[name];
      if (state) applyState(name, state);
    }
  }

  function showError(msg) {
    const banner = document.getElementById('error-banner');
    if (msg) { banner.textContent = msg; banner.style.display = 'block'; }
    else { banner.style.display = 'none'; }
  }

  async function gitPull(btn, name) {
    btn.disabled = true;
    btn.textContent = 'Pulling…';
    btn.classList.remove('ok', 'err');
    try {
      const res = await fetch(`/api/projects/${encodeURIComponent(name)}/git-pull`, { method: 'POST' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (data.returncode === 0) {
        btn.textContent = '✓ Pulled';
        btn.classList.add('ok');
      } else {
        btn.textContent = '✗ Error';
        btn.classList.add('err');
        showError(`git pull failed: ${data.stderr || data.stdout}`);
      }
    } catch (err) {
      btn.textContent = '✗ Error';
      btn.classList.add('err');
      showError('git pull failed: ' + err.message);
    } finally {
      btn.disabled = false;
      setTimeout(() => { btn.textContent = '↓ Pull'; btn.classList.remove('ok', 'err'); }, 3000);
    }
  }

  async function showDiff(name) {
    document.getElementById('diff-title').textContent = `git diff — ${name}`;
    const pre = document.getElementById('diff-pre');
    pre.innerHTML = '<span style="color:var(--muted)">Loading…</span>';
    document.getElementById('diff-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    try {
      const res = await fetch(`/api/projects/${encodeURIComponent(name)}/git-diff`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const { diff } = await res.json();
      pre.innerHTML = diff ? colorDiff(diff) : '<span style="color:var(--muted)">No changes.</span>';
    } catch (err) {
      pre.innerHTML = `<span style="color:var(--red)">Error: ${escHtml(err.message)}</span>`;
    }
  }

  function closeDiff(e) {
    if (e && e.target !== document.getElementById('diff-overlay')) return;
    document.getElementById('diff-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeDiff();
  });

  function colorDiff(text) {
    return text.split('\n').map(line => {
      const s = escHtml(line);
      if (line.startsWith('@@'))          return `<span class="diff-hunk">${s}</span>`;
      if (line.startsWith('+++') || line.startsWith('---') || line.startsWith('diff') || line.startsWith('index')) return `<span class="diff-meta">${s}</span>`;
      if (line.startsWith('+'))           return `<span class="diff-add">${s}</span>`;
      if (line.startsWith('-'))           return `<span class="diff-del">${s}</span>`;
      return s;
    }).join('\n');
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
